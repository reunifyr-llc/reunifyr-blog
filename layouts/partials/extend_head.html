<!-- Azure Application Insights (reunifyr-insights-prod) -->
<script src="https://js.monitor.azure.com/scripts/b/ai.3.gbl.min.js" crossorigin="anonymous"></script>
<script>
  (function () {
    if (typeof Microsoft === 'undefined' || !Microsoft.ApplicationInsights) { return; }
    var appInsights = new Microsoft.ApplicationInsights.ApplicationInsights({
      config: {
        connectionString: "InstrumentationKey=d1f314e2-499e-42f0-be93-bffeb1c2ae56;IngestionEndpoint=https://centralus-2.in.applicationinsights.azure.com/;LiveEndpoint=https://centralus.livediagnostics.monitor.azure.com/;ApplicationId=0c760ee7-a61e-4597-912f-fc8858291ca3",
        enableAutoRouteTracking: true,
        disableCookiesUsage: true,
        isStorageUseDisabled: true
      }
    });
    appInsights.loadAppInsights();
    appInsights.trackPageView();
    window.appInsights = appInsights;

    // Custom event: "Signup CTA Click" — view in Azure Portal > reunifyr-insights-prod > Logs > customEvents
    document.addEventListener('click', function (e) {
      var a = e.target.closest && e.target.closest('a');
      if (!a) return;
      var href = a.getAttribute('href') || '';
      var loc = a.getAttribute('data-cta') || '';
      if (href.indexOf('reunifyr.app/Account/Signup') !== -1) {
        try { appInsights.trackEvent({ name: 'Signup CTA Click' }, { location: loc || 'unknown', href: href, page: document.location.pathname }); } catch (err) {}
      } else if (href.indexOf('reunifyr.app') !== -1) {
        try { appInsights.trackEvent({ name: 'Outbound reunifyr.app' }, { href: href, page: document.location.pathname }); } catch (err) {}
      }
    }, true);
  })();
</script>
